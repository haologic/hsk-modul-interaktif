<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grammar HSK 1 | haologic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/modul.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container topbar">
        <a class="brand" href="../../menu.html">
          <span class="brand-box">汉</span>
          <span>
            <strong>haologic</strong>
            <small>HSK 1 Grammar</small>
          </span>
        </a>
        <nav class="inline-nav">
          <a href="../../menu.html">Dashboard</a>
          <a href="kosakata.html">Kosakata</a>
          <a href="soal-bab01.html">Bab 1</a>
        </nav>
      </div>
    </header>

    <main class="container page-stack">
      <section class="section-intro">
        <p class="eyebrow">GRAMMAR HSK 1</p>
        <h1>15 pola dasar HSK 1 dalam Bahasa Indonesia</h1>
        <p>Halaman ini saya pakai untuk menyusun grammar inti HSK 1 dengan penjelasan sederhana, pola cepat, dan contoh kalimat yang mudah dipahami pemula.</p>
      </section>

      <section id="grammar-list" class="grammar-list"></section>
    </main>
  </div>

  <script src="../../assets/data/hsk1/grammar.js"></script>
  <script>
    const grammarList = document.getElementById("grammar-list");

    hsk1Grammar.forEach((item, index) => {
      const article = document.createElement("article");
      article.className = "grammar-card";
      article.innerHTML = `
        <div class="grammar-header">
          <span class="grammar-number">${index + 1}</span>
          <div>
            <h2>${item.title}</h2>
            <p>${item.summary}</p>
          </div>
        </div>
        <div class="grammar-pattern">${item.pattern}</div>
        <p class="grammar-explanation">${item.explanation}</p>
        <div class="grammar-example-block">
          ${item.examples.map((example) => `
            <div class="example-card">
              <p class="example-cn">${example.cn}</p>
              <p class="example-pinyin">${example.pinyin}</p>
              <p class="example-id">${example.id}</p>
            </div>
          `).join("")}
        </div>
      `;
      grammarList.appendChild(article);
    });
  </script>
</body>
</html>
